# Production stack for the VPS. Images are built in CI and pulled from GHCR —
# nothing is built here. Run via the GitHub Actions self-hosted-runner deploy
# job, or manually:
#   TAG=latest docker compose -f docker-compose.prod.yml up -d
#
# Secrets live ONLY on the VPS at /opt/personal-kb/backend.env (never in git).
name: personal-kb

services:
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # published so the host-network backend can reach it on localhost
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    image: ghcr.io/dnhieu992/personal-kb-backend:${TAG:-latest}
    restart: unless-stopped
    # Host networking so the container reaches MySQL on the VPS's 127.0.0.1:3306
    # (the host MySQL only binds localhost, shared with the market-analysis app).
    # In that mode the backend also listens on the host's 0.0.0.0:4001 directly.
    network_mode: host
    env_file:
      # DATABASE_URL=mysql://pkb:pkbpass@127.0.0.1:3306/personal_kb , ANTHROPIC_API_KEY, FRONTEND_URL
      - /opt/personal-kb/backend.env
    environment:
      - QDRANT_URL=http://localhost:6333
      - PORT=4001
    volumes:
      - model_cache:/app/.cache
    depends_on:
      - qdrant

  frontend:
    image: ghcr.io/dnhieu992/personal-kb-frontend:${TAG:-latest}
    restart: unless-stopped
    environment:
      - API_INTERNAL_URL=http://backend:4001
      - PORT=4000
      - HOSTNAME=0.0.0.0
    # The image bakes the proxy target "http://backend:4001"; map that name to the
    # host, where the host-network backend listens on 4001.
    extra_hosts:
      - "backend:host-gateway"
    ports:
      - "4000:4000" # the only port that needs to be public
    depends_on:
      - backend

volumes:
  qdrant_data:
  model_cache:
