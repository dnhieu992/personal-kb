services:
  mysql:
    image: mysql:8
    container_name: pkb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: personal_kb
      MYSQL_USER: pkb
      MYSQL_PASSWORD: pkbpass
    ports:
      # Host 3307 -> container 3306, so it never clashes with the host MySQL
      # already on 3306 (used by market-analysis).
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant
    container_name: pkb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  qdrant_data:
